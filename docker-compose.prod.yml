# Production overlay for EC2 + RDS: runs ONLY the app container (no bundled Postgres).
# The database is your managed RDS instance — set DATABASE_URL in backend/.env to its
# connection string (see DEPLOY.md). The app applies Alembic migrations on start.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Reachable at http://<EC2-PUBLIC-IP>/  (app + /api + WebSocket on one origin).

services:
  app:
    build:
      context: .
    image: objective-content:latest
    env_file:
      - path: backend/.env      # all config + secrets, INCLUDING DATABASE_URL=<your RDS string>
        required: true
    ports:
      - "${APP_HOST_PORT:-80}:8000"   # default host :80 → container :8000 (set 8000 if behind a proxy/ALB)
    # "Prepare & Load" (Google Sheets) only: mount the service-account JSON and point
    # GOOGLE_SA_CREDENTIALS_FILE at it (in backend/.env). Skip if you don't use that feature.
    # volumes:
    #   - ./backend/secrets/google-sa.json:/app/google-sa.json:ro
    restart: unless-stopped
